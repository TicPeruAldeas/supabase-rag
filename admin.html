<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aldeas · Conversaciones</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --green:#075e54; --green2:#128c7e; --bubble-user:#d9fdd3; --bubble-bot:#ffffff;
      --chat-bg:#efeae2; --side-bg:#ffffff; --line:#e6e6e6; --muted:#667781; --text:#111b21;
    }
    html,body { height:100%; margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text); }
    .app { display:flex; height:100vh; }
    /* Sidebar */
    .side { width:340px; min-width:280px; border-right:1px solid var(--line); background:var(--side-bg); display:flex; flex-direction:column; }
    .side-head { background:var(--green); color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; }
    .side-head h1 { font-size:16px; margin:0; font-weight:600; }
    .side-head button { background:rgba(255,255,255,.2); color:#fff; border:0; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:13px; }
    .whoami { padding:7px 12px; font-size:12px; color:var(--muted); background:#f7f9fa; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:6px; white-space:nowrap; overflow:hidden; }
    .whoami .who { overflow:hidden; text-overflow:ellipsis; }
    .whoami b { color:var(--text); }
    .scope { background:var(--green2); color:#fff; border-radius:10px; padding:1px 8px; font-size:11px; font-weight:600; }
    .whoami a.out { margin-left:auto; color:var(--green2); text-decoration:none; font-weight:600; }
    .whoami a.out:hover { text-decoration:underline; }
    .search { padding:8px; border-bottom:1px solid var(--line); }
    .search input { width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:20px; font-size:14px; outline:none; }
    .users { overflow-y:auto; flex:1; }
    .user { display:flex; gap:10px; padding:10px 14px; border-bottom:1px solid #f2f2f2; cursor:pointer; align-items:center; }
    .user:hover { background:#f5f5f5; }
    .user.active { background:#e9f3f1; }
    .avatar { width:42px; height:42px; border-radius:50%; background:var(--green2); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; flex-shrink:0; }
    .user-main { flex:1; min-width:0; }
    .user-top { display:flex; justify-content:space-between; gap:8px; }
    .user-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .user-time { font-size:11px; color:var(--muted); flex-shrink:0; }
    .user-snippet { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .badge { background:var(--green2); color:#fff; border-radius:10px; font-size:11px; padding:1px 7px; }
    /* Chat */
    .chat { flex:1; display:flex; flex-direction:column; background:var(--chat-bg); }
    .chat-head { background:#f0f2f5; border-bottom:1px solid var(--line); padding:12px 18px; display:flex; align-items:center; gap:10px; }
    .chat-head .avatar { width:38px; height:38px; }
    .chat-head .title { font-weight:600; font-size:15px; }
    .chat-head .sub { font-size:12px; color:var(--muted); }
    .chat-head .dl { margin-left:auto; background:var(--green2); color:#fff; border:0; border-radius:6px; padding:7px 12px; cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap; }
    .chat-head .dl:hover { background:var(--green); }
    .chat-head .dl:disabled { opacity:.5; cursor:default; }
    .messages { flex:1; overflow-y:auto; padding:20px 8%; display:flex; flex-direction:column; gap:8px; }
    .row { display:flex; }
    .row.user { justify-content:flex-end; }
    .row.assistant { justify-content:flex-start; }
    .bubble { max-width:72%; padding:8px 11px; border-radius:8px; font-size:14px; line-height:1.4; box-shadow:0 1px .5px rgba(0,0,0,.08); white-space:pre-wrap; word-wrap:break-word; }
    .row.user .bubble { background:var(--bubble-user); border-top-right-radius:2px; }
    .row.assistant .bubble { background:var(--bubble-bot); border-top-left-radius:2px; }
    .bubble .time { display:block; font-size:10.5px; color:var(--muted); text-align:right; margin-top:4px; }
    .meta { font-size:10.5px; color:var(--muted); margin-top:3px; }
    .meta a { color:var(--green2); }
    .empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted); text-align:center; padding:20px; }
    .day { align-self:center; background:#fff; color:var(--muted); font-size:11px; padding:4px 10px; border-radius:8px; margin:6px 0; box-shadow:0 1px .5px rgba(0,0,0,.08); }
    @media (max-width:640px){ .side{width:100%;} .chat{display:none;} .app.show-chat .side{display:none;} .app.show-chat .chat{display:flex;} }
    /* Modal de usuarios */
    .modal { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:center; justify-content:center; padding:20px; z-index:50; }
    .modal.open { display:flex; }
    .modal-card { background:#fff; border-radius:12px; width:100%; max-width:720px; max-height:88vh; display:flex; flex-direction:column; overflow:hidden; }
    .modal-head { background:var(--green); color:#fff; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; }
    .modal-head h2 { margin:0; font-size:16px; }
    .modal-head button { background:transparent; border:0; color:#fff; font-size:18px; cursor:pointer; }
    .modal-body { padding:18px; overflow-y:auto; }
    .sect { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin:0 0 10px; }
    /* Lista de usuarios */
    .urow { border:1px solid var(--line); border-radius:10px; padding:11px 13px; margin-bottom:9px; }
    .urow .top { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
    .urow .uname { font-weight:600; font-size:14px; }
    .urow .spacer { margin-left:auto; }
    .urow .acts { display:flex; gap:6px; }
    .urow .acts button { border:1px solid var(--line); background:#fff; border-radius:6px; padding:5px 10px; cursor:pointer; font-size:12px; color:var(--text); }
    .urow .acts button:hover { background:#f5f5f5; }
    .urow .acts button.danger { color:#a3261b; border-color:#f0c6c2; }
    .urow .acts button.danger:hover { background:#fdecea; }
    .uempty { border:1px dashed var(--line); border-radius:10px; padding:18px; text-align:center; color:var(--muted); font-size:13px; }
    .pill { border-radius:10px; padding:2px 9px; font-size:11px; font-weight:600; }
    .pill.on { background:#e4f5ea; color:#1b7a43; }
    .pill.off { background:#f1f1f1; color:#777; }
    .cchip { background:#eaf2f7; color:#245b7d; border-radius:10px; padding:2px 9px; font-size:11px; font-weight:600; }
    /* Panel de edición desplegable */
    .uedit { margin-top:11px; padding-top:11px; border-top:1px dashed var(--line); }
    /* Formularios */
    .field { margin-bottom:12px; }
    .field > label { display:block; font-size:12px; font-weight:600; margin-bottom:5px; color:var(--text); }
    .field input[type=text], .field input[type=password] { width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:14px; outline:none; }
    .field input:focus { border-color:var(--green2); box-shadow:0 0 0 3px rgba(18,140,126,.10); }
    .pwrap { display:flex; gap:6px; }
    .pwrap input { flex:1; }
    .mini { border:1px solid var(--line); background:#fff; border-radius:8px; padding:0 11px; cursor:pointer; font-size:12px; white-space:nowrap; }
    .mini:hover { background:#f5f5f5; }
    .chips { display:flex; gap:7px; flex-wrap:wrap; }
    .chip { border:1px solid var(--line); background:#fff; border-radius:20px; padding:6px 13px; cursor:pointer; font-size:13px; user-select:none; }
    .chip:hover { background:#f5f5f5; }
    .chip.sel { background:var(--green2); border-color:var(--green2); color:#fff; font-weight:600; }
    .primary { background:var(--green2); color:#fff; border:0; border-radius:8px; padding:10px 18px; font-weight:600; cursor:pointer; font-size:14px; }
    .primary:hover { background:var(--green); }
    .ghost { background:#fff; border:1px solid var(--line); border-radius:8px; padding:10px 16px; cursor:pointer; font-size:14px; }
    .newu { margin-top:20px; border-top:1px solid var(--line); padding-top:16px; }
    .hint { font-size:12px; color:var(--muted); margin-top:8px; }
    .msg { padding:9px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; display:none; }
    .msg.ok { background:#e4f5ea; color:#1b7a43; display:block; }
    .msg.bad { background:#fdecea; color:#a3261b; display:block; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="side">
      <div class="side-head">
        <h1>💬 Aldeas · Conversaciones</h1>
        <button id="refresh" title="Actualizar">↻</button>
      </div>
      <div class="whoami" id="whoami"></div>
      <div class="search"><input id="search" placeholder="Buscar número…" /></div>
      <div class="users" id="users"><div class="empty">Cargando…</div></div>
    </aside>
    <main class="chat">
      <div class="chat-head" id="chatHead" style="display:none;">
        <div class="avatar" id="chatAvatar"></div>
        <div><div class="title" id="chatTitle"></div><div class="sub" id="chatSub"></div></div>
        <button class="dl" id="dl" title="Descargar todo el historial de este chat en Excel">⤓ Excel</button>
      </div>
      <div class="messages" id="messages"><div class="empty">Selecciona una persona para ver la conversación.</div></div>
    </main>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h2>Usuarios del panel</h2>
        <button id="modalClose" title="Cerrar">✕</button>
      </div>
      <div class="modal-body">
        <div class="msg" id="userMsg"></div>

        <p class="sect">Usuarios con acceso</p>
        <div id="userList"><div class="uempty">Cargando…</div></div>

        <div class="newu">
          <p class="sect">Agregar nuevo usuario</p>
          <div class="field">
            <label for="nuUser">Nombre de usuario</label>
            <input type="text" id="nuUser" placeholder="p. ej. maria" autocomplete="off" />
          </div>
          <div class="field">
            <label for="nuPass">Contraseña</label>
            <div class="pwrap">
              <input type="password" id="nuPass" placeholder="mínimo 8 caracteres" autocomplete="new-password" />
              <button type="button" class="mini" id="nuEye">Ver</button>
              <button type="button" class="mini" id="nuGen">Generar</button>
            </div>
          </div>
          <div class="field">
            <label>¿Qué conversaciones podrá ver?</label>
            <div class="chips" id="nuCountries"></div>
          </div>
          <button class="primary" id="nuAdd">Agregar usuario</button>
          <div class="hint">Quien tenga acceso a <b>todos los países</b> también puede gestionar usuarios.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let allUsers = [];
    let current = null;

    function fmtTime(iso){ try{ return new Date(iso).toLocaleString("es-PE",{hour:"2-digit",minute:"2-digit"}); }catch{ return ""; } }
    function fmtDay(iso){ try{ return new Date(iso).toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long"}); }catch{ return ""; } }
    function initials(num){ const d=String(num).replace(/\D/g,""); return d.slice(-2) || "?"; }
    function linkify(text){
      const frag=document.createDocumentFragment();
      const re=/(https?:\/\/[^\s]+)/g; let last=0,m;
      while((m=re.exec(text))){
        if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));
        const a=document.createElement("a"); a.href=m[0]; a.target="_blank"; a.rel="noopener"; a.textContent=m[0];
        frag.appendChild(a); last=m.index+m[0].length;
      }
      if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      return frag;
    }

    async function loadMe(){
      try{
        const r=await fetch("/admin/api/me"); if(!r.ok) return;
        const j=await r.json();
        const scope=(j.countries||[]).includes("*") ? "Todos los países" : (j.countries||[]).join(", ");
        $("whoami").innerHTML="";
        const who=document.createElement("span"); who.className="who";
        const b=document.createElement("b"); b.textContent=j.user||"—";
        who.append(b);
        const s=document.createElement("span"); s.className="scope"; s.textContent=scope;
        $("whoami").append(who,s);
        // Solo los administradores generales (*) gestionan usuarios.
        if((j.countries||[]).includes("*")){
          const gu=document.createElement("a"); gu.className="out"; gu.href="#"; gu.textContent="⚙ Usuarios";
          gu.style.marginLeft="auto";
          gu.onclick=(e)=>{ e.preventDefault(); openUsers(); };
          $("whoami").append(gu);
        }
        const out=document.createElement("a"); out.className="out"; out.href="/admin/logout"; out.textContent="Salir";
        if((j.countries||[]).includes("*")) out.style.marginLeft="12px";
        $("whoami").append(out);
      }catch{}
    }

    // ── Gestión de usuarios del panel ──
    function uMsg(text, ok){
      const el=$("userMsg"); el.className="msg "+(ok?"ok":"bad"); el.textContent=text;
      if(ok) setTimeout(()=>{ el.className="msg"; }, 2500);
    }

    async function api(url, opts){
      const r=await fetch(url, Object.assign({headers:{"Content-Type":"application/json"}}, opts||{}));
      let j={}; try{ j=await r.json(); }catch{}
      if(!r.ok) throw new Error(j.error||("Error "+r.status));
      return j;
    }

    // Países disponibles (se cargan una vez y se reutilizan en los selectores)
    let PAISES=[];
    async function cargarPaises(){
      if(PAISES.length) return PAISES;
      try{ const j=await api("/admin/api/countries"); PAISES=j.countries||[]; }catch{ PAISES=[]; }
      return PAISES;
    }

    // Selector de países con chips. Devuelve un objeto con .valor() -> "*" o "PE|CO"
    function crearSelectorPaises(contenedor, seleccionInicial){
      const sel=new Set(seleccionInicial==="*"?["*"]:String(seleccionInicial||"*").split("|").filter(Boolean));
      contenedor.innerHTML="";
      const chips=[];
      function pintar(){ chips.forEach(({el,val})=>el.classList.toggle("sel", sel.has(val))); }
      function chip(val,texto){
        const el=document.createElement("div"); el.className="chip"; el.textContent=texto;
        el.onclick=()=>{
          if(val==="*"){ sel.clear(); sel.add("*"); }
          else{
            sel.delete("*");
            if(sel.has(val)) sel.delete(val); else sel.add(val);
            if(sel.size===0) sel.add("*");
          }
          pintar();
        };
        contenedor.appendChild(el); chips.push({el,val});
      }
      chip("*","🌎 Todos los países");
      PAISES.forEach(p=>chip(p,p));
      pintar();
      return { valor: ()=> sel.has("*") ? "*" : [...sel].join("|") };
    }

    function textoPaises(c){ return c==="*" ? "Todos los países" : String(c).split("|").join(" · "); }

    function generarClave(){
      const abc="abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      const a=new Uint32Array(14); crypto.getRandomValues(a);
      return [...a].map(n=>abc[n%abc.length]).join("");
    }

    async function loadAdminUsers(){
      const cont=$("userList");
      cont.innerHTML='<div class="uempty">Cargando…</div>';
      await cargarPaises();
      try{
        const j=await api("/admin/api/admin-users");
        cont.innerHTML="";
        if(!j.users.length){
          cont.innerHTML='<div class="uempty">Aún no hay usuarios creados.<br>Agrega el primero con el formulario de abajo.</div>';
        }
        for(const u of j.users){
          const row=document.createElement("div"); row.className="urow";
          const top=document.createElement("div"); top.className="top";
          const nombre=document.createElement("span"); nombre.className="uname"; nombre.textContent=u.username;
          const paises=document.createElement("span"); paises.className="cchip"; paises.textContent=textoPaises(u.countries);
          const estado=document.createElement("span"); estado.className="pill "+(u.active?"on":"off"); estado.textContent=u.active?"Activo":"Inactivo";
          const sp=document.createElement("span"); sp.className="spacer";
          const acts=document.createElement("div"); acts.className="acts";

          const bEdit=document.createElement("button"); bEdit.textContent="Editar";
          const bTog=document.createElement("button"); bTog.textContent=u.active?"Desactivar":"Activar";
          bTog.onclick=async()=>{ try{ await api("/admin/api/admin-users/"+u.id,{method:"PATCH",body:JSON.stringify({active:!u.active})});
            uMsg(u.active?"Usuario desactivado":"Usuario activado",true); loadAdminUsers(); }catch(e){ uMsg(e.message,false); } };
          const bDel=document.createElement("button"); bDel.className="danger"; bDel.textContent="Eliminar";
          bDel.onclick=async()=>{ if(!confirm("¿Eliminar a "+u.username+"?\n\nPerderá el acceso al panel de inmediato.")) return;
            try{ await api("/admin/api/admin-users/"+u.id,{method:"DELETE"}); uMsg("Usuario eliminado",true); loadAdminUsers(); }catch(e){ uMsg(e.message,false); } };

          acts.append(bEdit,bTog,bDel);
          top.append(nombre,paises,estado,sp,acts);
          row.appendChild(top);

          // Panel de edición desplegable
          const ed=document.createElement("div"); ed.className="uedit"; ed.hidden=true;
          const f1=document.createElement("div"); f1.className="field";
          f1.innerHTML='<label>Nueva contraseña <span style="font-weight:400;color:#667781">(dejar vacío para no cambiarla)</span></label>';
          const pw=document.createElement("div"); pw.className="pwrap";
          const pin=document.createElement("input"); pin.type="password"; pin.placeholder="mínimo 8 caracteres";
          const pver=document.createElement("button"); pver.type="button"; pver.className="mini"; pver.textContent="Ver";
          pver.onclick=()=>{ pin.type=pin.type==="password"?"text":"password"; pver.textContent=pin.type==="password"?"Ver":"Ocultar"; };
          const pgen=document.createElement("button"); pgen.type="button"; pgen.className="mini"; pgen.textContent="Generar";
          pgen.onclick=()=>{ pin.value=generarClave(); pin.type="text"; pver.textContent="Ocultar"; };
          pw.append(pin,pver,pgen); f1.appendChild(pw);

          const f2=document.createElement("div"); f2.className="field";
          f2.innerHTML='<label>¿Qué conversaciones puede ver?</label>';
          const chipsBox=document.createElement("div"); chipsBox.className="chips"; f2.appendChild(chipsBox);
          const selector=crearSelectorPaises(chipsBox,u.countries);

          const acciones=document.createElement("div"); acciones.style.display="flex"; acciones.style.gap="8px";
          const bSave=document.createElement("button"); bSave.className="primary"; bSave.textContent="Guardar cambios";
          const bCancel=document.createElement("button"); bCancel.className="ghost"; bCancel.textContent="Cancelar";
          bCancel.onclick=()=>{ ed.hidden=true; bEdit.textContent="Editar"; };
          bSave.onclick=async()=>{
            const cuerpo={ countries: selector.valor() };
            if(pin.value) cuerpo.password=pin.value;
            try{ await api("/admin/api/admin-users/"+u.id,{method:"PATCH",body:JSON.stringify(cuerpo)});
              uMsg("Cambios guardados para "+u.username,true); loadAdminUsers(); }catch(e){ uMsg(e.message,false); }
          };
          acciones.append(bSave,bCancel);
          ed.append(f1,f2,acciones);
          row.appendChild(ed);

          bEdit.onclick=()=>{ ed.hidden=!ed.hidden; bEdit.textContent=ed.hidden?"Editar":"Cerrar"; };
          cont.appendChild(row);
        }
        if(j.envFallback && j.envFallback.length){
          const nota=document.createElement("div"); nota.className="hint";
          nota.textContent="También hay accesos definidos en Railway (ADMIN_USERS): "+j.envFallback.join(", ")+". Solo se usan si el usuario no existe en esta lista.";
          cont.appendChild(nota);
        }
      }catch(e){ cont.innerHTML='<div class="uempty">'+e.message+'</div>'; }
    }

    let selectorNuevo=null;
    async function openUsers(){
      $("modal").classList.add("open");
      await cargarPaises();
      selectorNuevo=crearSelectorPaises($("nuCountries"),"*");
      loadAdminUsers();
    }
    $("modalClose").addEventListener("click", ()=>$("modal").classList.remove("open"));
    $("modal").addEventListener("click", (e)=>{ if(e.target===$("modal")) $("modal").classList.remove("open"); });
    $("nuEye").addEventListener("click", ()=>{ const p=$("nuPass");
      p.type=p.type==="password"?"text":"password"; $("nuEye").textContent=p.type==="password"?"Ver":"Ocultar"; });
    $("nuGen").addEventListener("click", ()=>{ $("nuPass").value=generarClave(); $("nuPass").type="text"; $("nuEye").textContent="Ocultar"; });
    $("nuAdd").addEventListener("click", async()=>{
      const username=$("nuUser").value.trim(), password=$("nuPass").value;
      const countries=selectorNuevo?selectorNuevo.valor():"*";
      if(!username||!password) return uMsg("Escribe un usuario y una contraseña",false);
      if(password.length<8) return uMsg("La contraseña debe tener al menos 8 caracteres",false);
      try{
        await api("/admin/api/admin-users",{method:"POST",body:JSON.stringify({username,password,countries})});
        uMsg('Usuario "'+username+'" creado con acceso a: '+textoPaises(countries),true);
        $("nuUser").value=""; $("nuPass").value=""; $("nuPass").type="password"; $("nuEye").textContent="Ver";
        selectorNuevo=crearSelectorPaises($("nuCountries"),"*");
        loadAdminUsers();
      }catch(e){ uMsg(e.message,false); }
    });

    async function loadUsers(){
      $("users").innerHTML='<div class="empty">Cargando…</div>';
      try{
        const r=await fetch("/admin/api/users"); if(!r.ok) throw new Error(r.status);
        const j=await r.json(); allUsers=j.users||[];
        renderUsers();
      }catch(e){ $("users").innerHTML='<div class="empty">Error cargando ('+e.message+')</div>'; }
    }

    function renderUsers(){
      const q=$("search").value.trim().toLowerCase();
      const list=allUsers.filter(u=>u.user_id.toLowerCase().includes(q));
      if(!list.length){ $("users").innerHTML='<div class="empty">Sin conversaciones.</div>'; return; }
      const box=document.createElement("div");
      for(const u of list){
        const el=document.createElement("div");
        el.className="user"+(current&&current.user_id===u.user_id&&current.country_code===u.country_code?" active":"");
        el.onclick=()=>openThread(u);
        const av=document.createElement("div"); av.className="avatar"; av.textContent=initials(u.user_id);
        const main=document.createElement("div"); main.className="user-main";
        const top=document.createElement("div"); top.className="user-top";
        const name=document.createElement("div"); name.className="user-name"; name.textContent="+"+u.user_id+" ("+u.country_code+")";
        const time=document.createElement("div"); time.className="user-time"; time.textContent=fmtTime(u.last_at);
        top.append(name,time);
        const snip=document.createElement("div"); snip.className="user-snippet";
        snip.textContent=(u.last_role==="assistant"?"Asistente: ":"")+(u.last_message||"").replace(/\n/g," ");
        main.append(top,snip);
        el.append(av,main);
        box.appendChild(el);
      }
      $("users").innerHTML=""; $("users").appendChild(box);
    }

    async function openThread(u){
      current=u; renderUsers();
      $("app").classList.add("show-chat");
      $("chatHead").style.display="flex";
      $("chatAvatar").textContent=initials(u.user_id);
      $("chatTitle").textContent="+"+u.user_id;
      $("chatSub").textContent=u.country_code+" · "+u.count+" mensajes";
      $("messages").innerHTML='<div class="empty">Cargando…</div>';
      try{
        const r=await fetch("/admin/api/thread?user="+encodeURIComponent(u.user_id)+"&country="+encodeURIComponent(u.country_code));
        if(!r.ok) throw new Error(r.status);
        const j=await r.json(); renderThread(j.turns||[]);
      }catch(e){ $("messages").innerHTML='<div class="empty">Error ('+e.message+')</div>'; }
    }

    function renderThread(turns){
      const wrap=document.createElement("div"); wrap.style.display="contents";
      let lastDay="";
      if(!turns.length){ $("messages").innerHTML='<div class="empty">Sin mensajes.</div>'; return; }
      for(const t of turns){
        const day=fmtDay(t.created_at);
        if(day!==lastDay){ const d=document.createElement("div"); d.className="day"; d.textContent=day; wrap.appendChild(d); lastDay=day; }
        const row=document.createElement("div"); row.className="row "+t.role;
        const b=document.createElement("div"); b.className="bubble";
        b.appendChild(linkify(t.message||""));
        const time=document.createElement("span"); time.className="time"; time.textContent=fmtTime(t.created_at);
        b.appendChild(time);
        // Meta bajo respuestas del asistente
        if(t.role==="assistant" && t.metadata){
          const m=t.metadata; const bits=[];
          if(m.route) bits.push(m.route);
          if(m.flow_id) bits.push(m.flow_id);
          if(m.cite_source_url) bits.push("citó fuente");
          if(bits.length){ const meta=document.createElement("div"); meta.className="meta"; meta.textContent=bits.join(" · "); b.appendChild(meta); }
        }
        row.appendChild(b); wrap.appendChild(row);
      }
      $("messages").innerHTML=""; $("messages").appendChild(wrap);
      $("messages").scrollTop=$("messages").scrollHeight;
    }

    $("search").addEventListener("input", renderUsers);
    $("refresh").addEventListener("click", ()=>{ loadUsers(); if(current) openThread(current); });
    $("dl").addEventListener("click", ()=>{
      if(!current) return;
      const url="/admin/api/export?user="+encodeURIComponent(current.user_id)+"&country="+encodeURIComponent(current.country_code);
      const a=document.createElement("a"); a.href=url; a.download=""; document.body.appendChild(a); a.click(); a.remove();
    });
    loadMe();
    loadUsers();
  </script>
</body>
</html>
