<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aldeas · Ingresar al panel</title>
  <style>
    :root { --green:#075e54; --green2:#128c7e; --line:#e6e6e6; --muted:#667781; --text:#111b21; }
    * { box-sizing:border-box; }
    html,body { height:100%; margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--text); }
    body { display:flex; align-items:center; justify-content:center; background:#eef3f2; padding:20px; }
    .card { background:#fff; width:100%; max-width:380px; border-radius:12px; box-shadow:0 6px 24px rgba(0,0,0,.10); overflow:hidden; }
    .head { background:var(--green); color:#fff; padding:22px 24px; }
    .head h1 { margin:0; font-size:18px; font-weight:600; }
    .head p { margin:6px 0 0; font-size:13px; opacity:.85; }
    form { padding:22px 24px 24px; }
    label { display:block; font-size:13px; font-weight:600; margin:0 0 6px; }
    input { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:15px; outline:none; margin-bottom:14px; }
    input:focus { border-color:var(--green2); box-shadow:0 0 0 3px rgba(18,140,126,.12); }
    button { width:100%; background:var(--green2); color:#fff; border:0; border-radius:8px; padding:12px; font-size:15px; font-weight:600; cursor:pointer; }
    button:hover { background:var(--green); }
    /* Campo de contraseña con botón para mostrar/ocultar */
    .pwd { position:relative; }
    .pwd input { padding-right:44px; }
    .pwd .eye { position:absolute; right:5px; top:5px; width:34px; height:34px; padding:0; margin:0;
      display:flex; align-items:center; justify-content:center; background:transparent; border:0;
      border-radius:6px; color:var(--muted); cursor:pointer; }
    .pwd .eye:hover { background:#f2f2f2; color:var(--text); }
    .pwd .eye:focus-visible { outline:2px solid var(--green2); outline-offset:1px; }
    .error { background:#fdecea; color:#a3261b; border:1px solid #f5c6c2; border-radius:8px; padding:10px 12px; font-size:13px; margin-bottom:14px; }
    .foot { text-align:center; font-size:12px; color:var(--muted); padding:0 24px 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <h1>Panel de conversaciones</h1>
      <p>Aldeas Infantiles SOS</p>
    </div>
    <form method="POST" action="/admin/login">
      <div class="error" id="err" style="display:none;">Usuario o contraseña incorrectos.</div>
      <label for="user">Usuario</label>
      <input id="user" name="user" autocomplete="username" autofocus required />
      <label for="password">Contraseña</label>
      <div class="pwd">
        <input id="password" name="password" type="password" autocomplete="current-password" required />
        <button type="button" class="eye" id="eye" aria-label="Mostrar contraseña" title="Mostrar contraseña"></button>
      </div>
      <button type="submit">Ingresar</button>
    </form>
    <div class="foot">Acceso restringido. La información es confidencial.</div>
  </div>
  <script>
    if (new URLSearchParams(location.search).has("error")) {
      document.getElementById("err").style.display = "block";
    }

    // Mostrar / ocultar contraseña
    var ICON_SHOW = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    var ICON_HIDE = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-6.5 0-10-8-10-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c6.5 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    var pwd = document.getElementById("password");
    var eye = document.getElementById("eye");
    eye.innerHTML = ICON_SHOW;
    eye.addEventListener("click", function () {
      var mostrar = pwd.type === "password";
      pwd.type = mostrar ? "text" : "password";
      eye.innerHTML = mostrar ? ICON_HIDE : ICON_SHOW;
      var etiqueta = mostrar ? "Ocultar contraseña" : "Mostrar contraseña";
      eye.setAttribute("aria-label", etiqueta);
      eye.setAttribute("title", etiqueta);
      pwd.focus();
    });
  </script>
</body>
</html>
